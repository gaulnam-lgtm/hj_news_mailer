name: 뉴스 서치 메일 발송

on:
  repository_dispatch:
    types: [cron-trigger]
  workflow_dispatch:           # 수동 실행 버튼도 활성화

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install gnews==0.3.7 newspaper3k lxml_html_clean

      - name: 뉴스 서치 및 메일 발송
        env:
          GMAIL_ID:           ${{ secrets.GMAIL_ID }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO:        ${{ secrets.MAIL_TO }}
          KEYWORDS:       ${{ secrets.KEYWORDS }}
        run: python news_mailer.py
